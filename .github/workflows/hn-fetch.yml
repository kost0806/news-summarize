name: Fetch HN Top 10 Data

on:
  push:
    branches: [main]
    paths:
      - 'hn_trigger'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch HN top 10 stories data
        run: python .github/scripts/fetch_hn_data.py

      - name: Commit HN data and images
        run: |
          rm -f hn_trigger
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hn_data.json img/posts/
          git add -u
          if ! git diff --cached --quiet; then
            git commit -m "fetch: HN top 10 data for $(date -u +%Y-%m-%d) [skip ci]"
            git push origin main
          else
            echo "No new data to commit"
          fi
