name: Fetch HN Top 10 and Create Posts

on:
  push:
    branches: [main]
    paths:
      - 'hn_trigger'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Fetch HN top 10 and create posts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python .github/scripts/fetch_hn.py

      - name: Commit and push posts
        run: |
          rm -f hn_trigger
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/ img/posts/
          git add -u
          if ! git diff --cached --quiet; then
            git commit -m "feat: add HN top 10 posts for $(date -u +%Y-%m-%d)"
            git push origin main
          else
            echo "No new posts to commit"
          fi
